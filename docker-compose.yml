services:
  flowback:
    container_name: flowback
    build: ./flowback
    networks:
      - app-network
      - db-network
    env_file:
      - .env
    depends_on:
      flow-sql:
        condition: service_healthy
      flow-mongo:
        condition: service_started
    volumes:
      - ./flowback:/app
      - ./flowback/uploads:/app/uploads

  flowfront:
    container_name: flowfront
    build:
      context: ./flowfront
      dockerfile: Dockerfile
    networks:
      - app-network
    volumes:
      - flowfront_dist:/app/dist

  flow-sql:
    container_name: flow-sql
    image: mysql:8.0
    networks:
      - db-network
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_INIT_COMMAND: "SET NAMES utf8mb4"
    volumes:
      - db_data:/var/lib/mysql
      - ./flow-sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./flow-sql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  flow-redis:
    container_name: flow-redis
    image: redis:7-alpine
    networks:
      - db-network
    restart: always
    volumes:
      - redis_data:/data
    env_file:
      - .env
    command: >
      redis-server
      --requirepass ${REDIS_ROOT_PASSWORD}
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_ROOT_PASSWORD}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  flow-mongo:
    container_name: flow-mongo
    image: mongo:7
    networks:
      - db-network
    restart: always
    volumes:
      - mongo_data:/data/db
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  nginx-B:
    container_name: nginx-B
    image: nginx:latest
    networks:
      - db-network
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - flowfront_dist:/usr/share/nginx/html
    depends_on:
      - flowback
    ports:
      - "8080:80"

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge

volumes:
  flowfront_dist:
  db_data:
  redis_data:
  mongo_data:
