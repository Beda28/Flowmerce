services:
  flowback:
    container_name: flowback
    build: ./flowback
    networks:
      - app-network
      - db-network
    env_file:
      - .env
    depends_on:
      flow-sql:
        condition: service_healthy
    volumes:
      - ./flowback:/app
      - ./flowback/uploads:/app/uploads

  flowfront:
    container_name: flowfront
    command: sh -c "cp -r /app/dist/* /data/share/"
    build:
      context: ./flowfront
      dockerfile: Dockerfile
    volumes:
      - ./flowfront:/app
      - flowfront_dist:/data/share

  flow-sql:
    container_name: flow-sql
    image: mysql:8.0
    networks:
      - db-network
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./flow-sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  flow-redis:
    container_name: flow-redis
    image: redis:7-alpine
    networks:
      - db-network
    restart: always
    volumes:
      - redis_data:/data
    env_file:
      - .env
    command: >
      redis-server
      --requirepass ${REDIS_ROOT_PASSWORD}
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_ROOT_PASSWORD}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx-B:
    container_name: nginx-B
    image: nginx:latest
    networks:
      - db-network
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - flowfront_dist:/usr/share/nginx/html
    depends_on:
      - flowfront
      - flowback
    ports:
      - "8080:80"

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge

volumes:
  flowfront_dist:
  db_data:
  redis_data:
